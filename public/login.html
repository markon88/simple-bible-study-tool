<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Bible Study Tool</title>
<link rel="stylesheet" href="/style.css">
</head>
<body class="login-page">
  <main class="login-card">
    <h1>Bible Study Tool</h1>
    <form id="login-form">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" required autofocus>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button type="submit">Sign in</button>
      <p id="login-error" class="error" hidden></p>
    </form>
    <p class="auth-links">
      <a href="/signup.html">Create an account</a> &middot; <a href="/forgot-password.html">Forgot password?</a>
    </p>
  </main>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');
      errorEl.hidden = true;
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      if (res.ok) {
        window.location.href = '/';
      } else {
        const data = await res.json().catch(() => ({}));
        errorEl.textContent = data.unverified
          ? 'Please verify your email before signing in — check your inbox for the link.'
          : (data.error || 'Sign in failed');
        errorEl.hidden = false;
      }
    });
  </script>
</body>
</html>
