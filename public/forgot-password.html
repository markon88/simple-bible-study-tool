<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot password — Bible Study Tool</title>
<link rel="stylesheet" href="/style.css">
</head>
<body class="login-page">
  <main class="login-card">
    <h1>Reset your password</h1>
    <form id="forgot-form">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" required autofocus>
      <button type="submit">Send reset link</button>
    </form>
    <p id="forgot-success" class="hint" hidden>If that email is registered, a reset link is on its way.</p>
    <p class="auth-links"><a href="/login.html">Back to sign in</a></p>
  </main>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      await fetch('/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      // Always show the same message, regardless of whether the email exists.
      document.getElementById('forgot-form').hidden = true;
      document.getElementById('forgot-success').hidden = false;
    });
  </script>
</body>
</html>
