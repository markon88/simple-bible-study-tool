<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password — Bible Study Tool</title>
<link rel="stylesheet" href="/style.css">
</head>
<body class="login-page">
  <main class="login-card">
    <h1>Choose a new password</h1>
    <form id="reset-form">
      <label for="new-password">New password</label>
      <input id="new-password" name="newPassword" type="password" autocomplete="new-password" minlength="8" required autofocus>
      <button type="submit">Reset password</button>
      <p id="reset-error" class="error" hidden></p>
    </form>
    <p id="reset-success" class="hint" hidden>Password reset — you can sign in now.</p>
    <p class="auth-links"><a href="/login.html">Back to sign in</a></p>
  </main>
  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('reset-error');
      errorEl.hidden = true;
      if (!token) {
        errorEl.textContent = 'Missing reset token — use the link from your email.';
        errorEl.hidden = false;
        return;
      }
      const newPassword = document.getElementById('new-password').value;
      const res = await fetch('/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword }),
      });
      if (res.ok) {
        document.getElementById('reset-form').hidden = true;
        document.getElementById('reset-success').hidden = false;
        setTimeout(() => { window.location.href = '/login.html'; }, 1500);
      } else {
        const data = await res.json().catch(() => ({}));
        errorEl.textContent = data.error || 'Could not reset password';
        errorEl.hidden = false;
      }
    });
  </script>
</body>
</html>
